<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <title>Document</title>
  </head>
  <body>
    <div class="content">
        <div class="form">
          <div class="logo"><img src="images/logo.svg"></div>
          <div class="inner">
            <div class="logIn"><img src="images/log-in.svg">Login</div>
            <div>Inser yout info below</div>
            <div class="text">E-mail</div>
            <div><input type="email" class="inputEM input" placeholder="Type your email"></div>
            <div class="text">Password</div>
            <div><input type="password" class="inputPS input" placeholder="Type your password"></div>
            <div class="twoLines">
              <div class="remindMe"><label><input type="checkbox"/>Remind me</label></div>
              <div class="forgot">Forgot my password?</div>
            </div>
            <div><button class="loginButton">LOGIN</button></div>
            <div class="noAcc">Don't have an account? <b> Sign up!</b></div>
          </div>
        </div>
        <div class="rightPic"><img src="images/side-image.jpg"></div>
    </div>
  </body>
</html>
